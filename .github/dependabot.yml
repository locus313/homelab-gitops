version: 2

updates:
  - package-ecosystem: "docker-compose"
    directories:
      - "/docker/*"
    schedule:
      interval: "daily"
    groups:
      docker-images:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Stateful services — major version bumps require manual data migration
      - dependency-name: "postgres"
        update-types: ["version-update:semver-major"]
      - dependency-name: "valkey/valkey"
        update-types: ["version-update:semver-major"]
      # Meilisearch breaks data format compatibility on any version bump — update manually
      - dependency-name: "getmeili/meilisearch"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]

  - package-ecosystem: "terraform"
    directories:
      - "/terraform/**"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      terraform-providers:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directories:
      - "/"
    schedule:
      interval: "weekly"
      day: "saturday"
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
