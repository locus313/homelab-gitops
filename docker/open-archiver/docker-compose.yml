services:
  open-archiver:
    image: logiclabshq/open-archiver:v0.5.0
    container_name: open-archiver
    restart: unless-stopped
    networks:
      - proxynet
      - open-archiver-net
    environment:
      NODE_ENV: production
      PORT_BACKEND: ${PORT_BACKEND:-4000}
      PORT_FRONTEND: ${PORT_FRONTEND:-3000}
      APP_URL: ${APP_URL}
      ORIGIN: ${ORIGIN}
      POSTGRES_DB: ${POSTGRES_DB:-open_archive}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: ${DATABASE_URL}
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_HOST: http://meilisearch:7700
      REDIS_HOST: valkey
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_TLS_ENABLED: "false"
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      STORAGE_LOCAL_ROOT_PATH: ${STORAGE_LOCAL_ROOT_PATH}
      BODY_SIZE_LIMIT: ${BODY_SIZE_LIMIT:-100M}
      STORAGE_ENCRYPTION_KEY: ${STORAGE_ENCRYPTION_KEY:-}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: "7d"
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      TIKA_URL: http://tika:9998
      ENABLE_DELETION: ${ENABLE_DELETION:-false}
      SYNC_FREQUENCY: ${SYNC_FREQUENCY:-* * * * *}
      ALL_INCLUSIVE_ARCHIVE: ${ALL_INCLUSIVE_ARCHIVE:-false}
      INGESTION_WORKER_CONCURRENCY: ${INGESTION_WORKER_CONCURRENCY:-5}
      TZ: ${TZ}
    volumes:
      - /mnt/docker/open-archiver/data:${STORAGE_LOCAL_ROOT_PATH}
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxynet
      - traefik.http.services.open-archiver.loadbalancer.server.port=3000
      - traefik.http.routers.open-archiver.rule=Host(`open-archiver.${TRAEFIK_BASE_DOMAIN}`)
      - traefik.http.routers.open-archiver.entrypoints=websecure
      - traefik.http.routers.open-archiver.tls=true
      - traefik.http.routers.open-archiver.tls.certresolver=cloudns

  postgres:
    image: postgres:18-alpine
    container_name: open-archiver-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-open_archive}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - open-archiver-pgdata:/var/lib/postgresql/data
    networks:
      - open-archiver-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-open_archive}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  valkey:
    image: valkey/valkey:8-alpine
    container_name: open-archiver-valkey
    restart: unless-stopped
    command: valkey-server --requirepass "${REDIS_PASSWORD}"
    volumes:
      - open-archiver-valkeydata:/data
    networks:
      - open-archiver-net
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  meilisearch:
    image: getmeili/meilisearch:v1.46.0
    container_name: open-archiver-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_SCHEDULE_SNAPSHOT: ${MEILI_SCHEDULE_SNAPSHOT:-86400}
    volumes:
      - open-archiver-meilidata:/meili_data
    networks:
      - open-archiver-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  tika:
    image: apache/tika:3.3.1.0-full
    container_name: open-archiver-tika
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "${TIKA_CPU_LIMIT:-1.0}"
          memory: ${TIKA_MEMORY_LIMIT:-1G}
    networks:
      - open-archiver-net

volumes:
  open-archiver-pgdata:
    driver: local
  open-archiver-valkeydata:
    driver: local
  open-archiver-meilidata:
    driver: local

networks:
  open-archiver-net:
    driver: bridge
  proxynet:
    external: true
