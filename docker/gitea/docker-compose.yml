services:
  gitea:
    image: gitea/gitea:1.26.1
    container_name: gitea
    restart: unless-stopped
    depends_on:
      gitea-db:
        condition: service_healthy
    networks:
      - proxynet
    ports:
      - "222:22"
    volumes:
      - ${DOCKER_BASE_PATH}/gitea/data:/data
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: gitea-db:5432
      GITEA__database__NAME: ${GITEA_DB_NAME}
      GITEA__database__USER: ${GITEA_DB_USER}
      GITEA__database__PASSWD: ${GITEA_DB_PASSWORD}
      GITEA__server__DOMAIN: gitea.${TRAEFIK_BASE_DOMAIN}
      GITEA__server__ROOT_URL: https://gitea.${TRAEFIK_BASE_DOMAIN}
      GITEA__server__HTTP_PORT: 3000
      GITEA__server__SSH_DOMAIN: gitea.${TRAEFIK_BASE_DOMAIN}
      GITEA__server__SSH_PORT: 222
    labels:
      - traefik.enable=true
      - traefik.http.services.gitea.loadbalancer.server.port=3000
      - traefik.http.routers.gitea.rule=Host(`gitea.${TRAEFIK_BASE_DOMAIN}`)
      - traefik.http.routers.gitea.entrypoints=websecure
      - traefik.http.routers.gitea.tls=true
      - traefik.http.routers.gitea.tls.certresolver=cloudns

  gitea-db:
    image: postgres:18.3
    container_name: gitea-db
    restart: unless-stopped
    networks:
      - proxynet
    volumes:
      - ${DOCKER_BASE_PATH}/gitea/db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${GITEA_DB_NAME}
      POSTGRES_USER: ${GITEA_DB_USER}
      POSTGRES_PASSWORD: ${GITEA_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

networks:
  proxynet:
    external: true
