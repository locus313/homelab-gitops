services:
  mail-archiver:
    image: s1t5/mailarchiver:2606.4
    container_name: mail-archiver
    restart: unless-stopped
    depends_on:
      mail-archiver-db:
        condition: service_healthy
    networks:
      - proxynet
    volumes:
      - ${DOCKER_BASE_PATH}/mail-archiver/keys:/app/DataProtection-Keys
      # Uncomment to enable local mbox/EML import from a host directory:
      # - ${MAIL_ARCHIVER_IMPORT_PATH}:/data/import
    environment:
      TZ: ${TZ}
      ConnectionStrings__DefaultConnection: >-
        Host=mail-archiver-db;Database=${MAIL_ARCHIVER_DB_NAME};Username=${MAIL_ARCHIVER_DB_USER};Password=${MAIL_ARCHIVER_DB_PASSWORD}
      Authentication__Username: ${MAIL_ARCHIVER_ADMIN_USER}
      Authentication__Password: ${MAIL_ARCHIVER_ADMIN_PASSWORD}
      TimeZone__DisplayTimeZoneId: ${TZ}
      AllowedHosts: "mail-archiver.${TRAEFIK_BASE_DOMAIN}"
      MailSync__IgnoreSelfSignedCert: "false"
      Upload__MaxFileSizeGB: "10"
      Upload__KeepAliveTimeoutHours: "4"
      Upload__RequestHeadersTimeoutHours: "2"
      # Uncomment to enable local mbox/EML import (also uncomment the volume above):
      # LocalImport__AllowedPaths__0: /data/import
      # Uncomment to enable OIDC SSO (see https://github.com/s1t5/mail-archiver/blob/main/doc/OIDC_Implementation.md):
      # OAuth__Enabled: "true"
      # OAuth__Authority: ${MAIL_ARCHIVER_OAUTH_AUTHORITY}
      # OAuth__ClientId: ${MAIL_ARCHIVER_OAUTH_CLIENT_ID}
      # OAuth__ClientSecret: ${MAIL_ARCHIVER_OAUTH_CLIENT_SECRET}
      # OAuth__DisplayName: ${MAIL_ARCHIVER_OAUTH_DISPLAY_NAME}
      # OAuth__ClientScopes__0: openid
      # OAuth__ClientScopes__1: profile
      # OAuth__ClientScopes__2: email
      # OAuth__AutoApproveUsers: "false"
      # OAuth__AdminEmails__0: ${MAIL_ARCHIVER_OAUTH_ADMIN_EMAIL}
    labels:
      - traefik.enable=true
      - traefik.http.services.mail-archiver.loadbalancer.server.port=5000
      - traefik.http.routers.mail-archiver.rule=Host(`mail-archiver.${TRAEFIK_BASE_DOMAIN}`)
      - traefik.http.routers.mail-archiver.entrypoints=websecure
      - traefik.http.routers.mail-archiver.tls=true
      - traefik.http.routers.mail-archiver.tls.certresolver=cloudns

  mail-archiver-db:
    image: postgres:18.4
    container_name: mail-archiver-db
    restart: unless-stopped
    networks:
      - proxynet
    volumes:
      - ${DOCKER_BASE_PATH}/mail-archiver/db:/var/lib/postgresql
    environment:
      POSTGRES_DB: ${MAIL_ARCHIVER_DB_NAME}
      POSTGRES_USER: ${MAIL_ARCHIVER_DB_USER}
      POSTGRES_PASSWORD: ${MAIL_ARCHIVER_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

networks:
  proxynet:
    external: true
