services:
  traefik:
    image: traefik:v3.7.1
    container_name: traefik
    restart: unless-stopped
    networks:
      - proxynet
    ports:
      - 80:80
      - 443:443
      - 8181:8080  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config:/etc/traefik:ro
      - /mnt/docker/traefik/cloudns-acme.json:/var/traefik/certs/cloudns-acme.json:rw
      - ${DOCKER_BASE_PATH}/traefik/logs:/logs
    environment:
      CLOUDNS_SUB_AUTH_ID: ${CLOUDNS_SUB_AUTH_ID}
      CLOUDNS_AUTH_PASSWORD: ${CLOUDNS_AUTH_PASSWORD}
      # Provider-specific propagation timeout (default is only 120s — not enough for CloudNS)
      CLOUDNS_PROPAGATION_TIMEOUT: ${CLOUDNS_PROPAGATION_TIMEOUT:-600}
      NAS_IP: ${NAS_IP}
      TRAEFIK_BASE_DOMAIN: ${TRAEFIK_BASE_DOMAIN}
      TZ: ${TZ}
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik-rtr.entrypoints=websecure
      - traefik.http.routers.traefik-rtr.rule=Host(`traefik.${TRAEFIK_BASE_DOMAIN}`)
      - traefik.http.routers.traefik-rtr.service=api@internal
      - traefik.http.routers.traefik-rtr.tls=true
      - traefik.http.routers.traefik-rtr.tls.certresolver=cloudns

networks:
  proxynet:
    external: true
