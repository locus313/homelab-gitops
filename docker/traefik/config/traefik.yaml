---
global:
  checkNewVersion: false
  sendAnonymousUsage: false

# Log levels: TRACE, DEBUG, INFO, WARN, ERROR, FATAL
# Use INFO for production, DEBUG for troubleshooting
log:
  filePath: "/logs/traefik.log"
  level: INFO

accessLog:
  filePath: "/logs/access.log"
  bufferingSize: 100
  filters:
    statusCodes:
      - "204-299"
      - "400-499"
      - "500-599"


# API disabled — dashboard not needed.
api:
  dashboard: false

entryPoints:
  web:
    address: :80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: :443
    http3: true
    transport:
      respondingTimeouts:
        readTimeout: 0  # Disabled — allows large file uploads (e.g. mail-archiver)

certificatesResolvers:
  cloudns:
    acme:
      storage: /var/traefik/certs/cloudns-acme.json
      caServer: "https://acme-v02.api.letsencrypt.org/directory"
      dnsChallenge:
        provider: cloudns
        propagation:
          delayBeforeChecks: 90s
        resolvers:
          - "8.8.8.8:53"
          - "8.8.4.4:53"

providers:
  docker:
    exposedByDefault: false
    network: proxynet
  file:
    directory: /etc/traefik/dynamic
    watch: true
