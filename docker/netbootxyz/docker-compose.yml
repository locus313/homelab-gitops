services:
  netbootxyz:
    image: ghcr.io/netbootxyz/netbootxyz:0.7.6-nbxyz18
    container_name: netbootxyz
    restart: unless-stopped
    networks:
      - proxynet
    # TFTP requires UDP port 69 for network boot
    ports:
      - 69:69/udp
      - 8080:80
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      NGINX_PORT: ${NGINX_PORT}
      WEB_APP_PORT: ${WEB_APP_PORT}
    volumes:
      - ${DOCKER_BASE_PATH}/netbootxyz/config:/config
      - ${DOCKER_BASE_PATH}/netbootxyz/assets:/assets
      # Custom menu files (autoexec.ipxe, local-vars.ipxe, custom.ipxe) are
      # managed directly in the persistent config/assets volumes on the host.
      # File bind mounts from the git repo are not used here due to a runc
      # incompatibility (MS_BIND|MS_REC on files inside mounted volumes).
      # To update custom files, copy them manually to:
      #   /docker/netbootxyz/config/menus/autoexec.ipxe
      #   /docker/netbootxyz/config/menus/local-vars.ipxe
      #   /docker/netbootxyz/assets/custom-menu/custom.ipxe
    labels:
      - traefik.enable=true
      - traefik.http.services.netbootxyz.loadbalancer.server.port=3000
      - traefik.http.routers.netbootxyz.rule=Host(`netbootxyz.${TRAEFIK_BASE_DOMAIN}`)
      - traefik.http.routers.netbootxyz.entrypoints=websecure
      - traefik.http.routers.netbootxyz.tls=true
      - traefik.http.routers.netbootxyz.tls.certresolver=cloudns

networks:
  proxynet:
    external: true
