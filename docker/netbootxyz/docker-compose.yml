services:
  netbootxyz:
    image: ghcr.io/netbootxyz/netbootxyz:0.7.6-nbxyz18
    container_name: netbootxyz
    restart: unless-stopped
    networks:
      - proxynet
    # TFTP requires UDP port 69 for network boot
    ports:
      - 69:69/udp
      - 8080:80
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      NGINX_PORT: ${NGINX_PORT}
      WEB_APP_PORT: ${WEB_APP_PORT}
    volumes:
      - ${DOCKER_BASE_PATH}/netbootxyz/config:/config
      - ${DOCKER_BASE_PATH}/netbootxyz/assets:/assets
      # Custom menu hookup — pure bind mounts of files NOT shipped by
      # upstream, so menu/image upgrades cannot clobber them.
      # autoexec.ipxe forces netboot.xyz.efi to chainload the local
      # menu.ipxe over TFTP instead of fetching from boot.netboot.xyz
      # over HTTPS (PXE works fully offline).
      # local-vars.ipxe sets ${custom_url}, which makes the upstream
      # menu surface a "Custom URL Menu" entry that chains
      # ${custom_url}/custom.ipxe (served by nginx from /assets/).
      # The init hook in custom-cont-init.d/ chowns these to nbxyz on
      # start (required by `dnsmasq --tftp-secure`); they cannot be
      # mounted :ro because that would block the chown.
      - ./autoexec.ipxe:/config/menus/autoexec.ipxe
      - ./custom-menu/local-vars.ipxe:/config/menus/local-vars.ipxe
      - ./custom-menu/custom.ipxe:/assets/custom-menu/custom.ipxe
      - ./custom-cont-init.d:/custom-cont-init.d:ro
    labels:
      - traefik.enable=true
      - traefik.http.services.netbootxyz.loadbalancer.server.port=3000
      - traefik.http.routers.netbootxyz.rule=Host(`netbootxyz.${TRAEFIK_BASE_DOMAIN}`)
      - traefik.http.routers.netbootxyz.entrypoints=websecure
      - traefik.http.routers.netbootxyz.tls=true
      - traefik.http.routers.netbootxyz.tls.certresolver=cloudns

networks:
  proxynet:
    external: true
